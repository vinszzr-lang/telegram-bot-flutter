name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path file ZIP hasil upload bot'
        required: true
        default: 'uploads/project.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Extract & Build
        run: |
          # Pastikan file ada
          if [ ! -f "${{ github.event.inputs.zip_path }}" ]; then
            echo "File tidak ditemukan di ${{ github.event.inputs.zip_path }}"
            exit 1
          fi

          # Ekstrak project
          unzip ${{ github.event.inputs.zip_path }} -d ./project_extracted
          
          # Cari folder yang ada pubspec.yaml-nya
          PROJECT_ROOT=$(find ./project_extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "Building in: $PROJECT_ROOT"
          
          cd $PROJECT_ROOT
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: '**/build/app/outputs/flutter-apk/*.apk'
          
