name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path file ZIP hasil upload bot'
        required: true
        default: 'uploads/project.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Extract & Build
        run: |
          # Cek file ada atau tidak
          if [ ! -f "${{ github.event.inputs.zip_path }}" ]; then
            echo "File tidak ditemukan di ${{ github.event.inputs.zip_path }}"
            exit 1
          fi

          # Ekstrak file
          unzip ${{ github.event.inputs.zip_path }} -d ./project_extracted
          
          # Cari folder root yang berisi pubspec.yaml
          PROJECT_ROOT=$(find ./project_extracted -name "pubspec.yaml" -exec dirname {} \;)
          cd $PROJECT_ROOT
          
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Menggunakan wildcard agar pasti ketemu APK-nya di mana pun lokasinya
          path: '**/build/app/outputs/flutter-apk/*.apk'
