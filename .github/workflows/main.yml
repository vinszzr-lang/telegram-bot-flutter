name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "ZIP Path"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Extract ZIP
        run: |

          if [ ! -f "${{ github.event.inputs.zip_path }}" ]; then
            echo "ZIP tidak ditemukan."
            exit 1
          fi

          mkdir project

          unzip -o "${{ github.event.inputs.zip_path }}" -d project

      - name: Find Flutter Root
        id: root
        run: |

          ROOT=$(find project -name pubspec.yaml -exec dirname {} \; | head -1)

          if [ -z "$ROOT" ]; then
            echo "pubspec.yaml tidak ditemukan."
            exit 1
          fi

          echo "root=$ROOT" >> $GITHUB_OUTPUT

      - name: Flutter Pub Get
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.root.outputs.root }}/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
