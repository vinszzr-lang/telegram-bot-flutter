name: Flutter APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"

      - name: Extract ZIP
        run: unzip VinzzProject.zip -d project

      - name: Find Flutter Project
        run: ls -la project

      - name: Pub Get
        run: |
          cd project
          flutter pub get

      - name: Build APK
        run: |
          cd project
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/build/app/outputs/flutter-apk/app-release.apk
