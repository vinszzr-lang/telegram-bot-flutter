name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID dari Spark Builder"
        required: true
      zip_url:
        description: "URL download ZIP dari server Express"
        required: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # Mempercepat build berikutnya dengan caching gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Mengunci versi flutter (opsional, tapi disarankan agar konsisten)
          # flutter-version: '3.22.0' 

      - name: Download & Extract ZIP Project
        run: |
          mkdir flutter-project
          echo "Downloading ZIP from: ${{ github.event.inputs.zip_url }}"
          
          # Download file zip menggunakan curl
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          
          if [ -f "project.zip" ]; then
            unzip -q "project.zip" -d flutter-project
            rm project.zip
          else
            echo "❌ Error: Gagal mendownload ZIP dari server."
            exit 1
          fi

      - name: Find Flutter Root Directory
        id: root
        run: |
          # Mencari letak pubspec.yaml pertama
          ROOT_PATH=$(find flutter-project -name pubspec.yaml | head -1)
          if [ -z "$ROOT_PATH" ]; then
            echo "❌ Error: Flutter project (pubspec.yaml) tidak ditemukan di dalam ZIP."
            exit 1
          fi
          REAL_ROOT=$(dirname "$ROOT_PATH")
          echo "Project root ditemukan di: $REAL_ROOT"
          echo "root=$REAL_ROOT" >> $GITHUB_OUTPUT

      - name: Generate local.properties
        working-directory: ${{ steps.root.outputs.root }}/android
        run: |
          # Menggunakan command 'which flutter' untuk mendapatkan letak SDK Flutter yang valid di runner
          FLUTTER_BIN=$(which flutter)
          FLUTTER_DIR=$(dirname $(dirname "$FLUTTER_BIN"))
          echo "flutter.sdk=$FLUTTER_DIR" > local.properties
          echo "✓ Berhasil generate local.properties"

      - name: Flutter Pub Get
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      - name: Build Production APK
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.job_id }}
          # Path diubah mencakup seluruh hasil split APK atau single APK agar aman
          path: ${{ steps.root.outputs.root }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 1
          
