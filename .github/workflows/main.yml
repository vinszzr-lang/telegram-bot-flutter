name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path file ZIP Flutter di repository"
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ======================
      # JAVA
      # ======================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ======================
      # FLUTTER
      # ======================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter
        run: flutter --version

      # ======================
      # DOWNLOAD ZIP
      # ======================
      - name: Download ZIP
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          ZIP="${{ github.event.inputs.zip_path }}"

          echo "ZIP = $ZIP"

          curl \
          -L \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github.raw" \
          "https://api.github.com/repos/${{ github.repository }}/contents/$ZIP" \
          -o source.zip

          if [ ! -f source.zip ]; then
            echo "ZIP gagal didownload"
            exit 1
          fi

      # ======================
      # EXTRACT
      # ======================
      - name: Extract ZIP
        run: |

          mkdir project

          unzip -o source.zip -d project

          rm source.zip

      # ======================
      # FIND ROOT
      # ======================
      - name: Find Flutter Project
        id: root
        run: |

          ROOT=$(find project -name pubspec.yaml | head -n 1)

          if [ -z "$ROOT" ]; then
            echo "pubspec.yaml tidak ditemukan"
            exit 1
          fi

          ROOT=$(dirname "$ROOT")

          echo "root=$ROOT" >> $GITHUB_OUTPUT

          echo "ROOT=$ROOT"

      # ======================
      # PUB GET
      # ======================
      - name: Install Dependency
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      # ======================
      # BUILD APK
      # ======================
      - name: Build APK
        working-directory: ${{ steps.root.outputs.root }}
        run: |

          flutter build apk \
          --release \
          --split-per-abi

      # ======================
      # CHECK APK
      # ======================
      - name: Verify APK
        run: |

          APK=$(find . -name "*.apk")

          echo "$APK"

          if [ -z "$APK" ]; then
            exit 1
          fi

      # ======================
      # UPLOAD
      # ======================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            **/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 7
