name: Flutter Build

on:
  # Pastikan ada bagian ini agar bot bisa memicu build
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path file ZIP'
        required: true
        default: 'uploads/project.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK
        run: |
          # Cari lokasi pubspec.yaml secara dinamis
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "Building in: $PROJECT_ROOT"
          cd $PROJECT_ROOT
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: '**/build/app/outputs/flutter-apk/*.apk'
