name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path ZIP project"
        required: true
      job_id:
        description: "Job ID"
        required: false
        default: "default"
      zip_url:
        description: "URL"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Extract ZIP
        env:
          ZIP_PATH: ${{ github.event.inputs.zip_path }}
        run: |
          if [ -f "$ZIP_PATH" ]; then
            mkdir flutter-project
            unzip -q "$ZIP_PATH" -d flutter-project
          else
            echo "Error: ZIP file not found at $ZIP_PATH"
            exit 1
          fi

      - name: Find Flutter Root
        id: root
        run: |
          ROOT=$(find flutter-project -name pubspec.yaml | head -1)
          if [ -z "$ROOT" ]; then
            echo "Error: Flutter project (pubspec.yaml) not found"
            exit 1
          fi
          echo "root=$(dirname $ROOT)" >> $GITHUB_OUTPUT

      # STEP PENTING: Generate local.properties agar Gradle bisa baca Flutter SDK
      - name: Generate local.properties
        working-directory: ${{ steps.root.outputs.root }}/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Flutter Pub Get
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.job_id }}
          path: ${{ steps.root.outputs.root }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
          
