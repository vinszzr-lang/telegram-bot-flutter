name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: "ZIP file name"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"

      - name: Extract ZIP
        run: |
          mkdir project
          unzip "uploads/${{ github.event.inputs.zip_name }}" -d project

      - name: Find Flutter Root
        id: flutter_root
        run: |
          PUBSPEC=$(find project -name pubspec.yaml | head -n 1)

          if [ -z "$PUBSPEC" ]; then
            echo "pubspec.yaml tidak ditemukan"
            exit 1
          fi

          ROOT=$(dirname "$PUBSPEC")

          echo "ROOT=$ROOT" >> $GITHUB_ENV

          echo "Flutter Root:"
          echo "$ROOT"

      - name: Flutter Pub Get
        run: |
          cd "$ROOT"
          flutter pub get

      - name: Build APK
        run: |
          cd "$ROOT"
          flutter build apk --release

      - name: Find APK
        run: |
          APK=$(find "$ROOT/build/app/outputs/flutter-apk" -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK tidak ditemukan"
            exit 1
          fi

          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: ${{ env.APK_PATH }}
