name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path ZIP Flutter"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Check ZIP
        run: |
          echo "ZIP PATH = ${{ github.event.inputs.zip_path }}"

          if [ ! -f "${{ github.event.inputs.zip_path }}" ]; then
            echo "ZIP tidak ditemukan!"
            exit 1
          fi

      - name: Extract ZIP
        run: |
          mkdir project

          unzip -o "${{ github.event.inputs.zip_path }}" -d project

      - name: Find Flutter Root
        id: root
        run: |

          ROOT=$(find project -name "pubspec.yaml" -exec dirname {} \; | head -n 1)

          if [ -z "$ROOT" ]; then
            echo "pubspec.yaml tidak ditemukan!"
            exit 1
          fi

          echo "root=$ROOT" >> $GITHUB_OUTPUT

          echo "Flutter Root = $ROOT"

      - name: Flutter Pub Get
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter build apk --release

      - name: Show APK
        run: |
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            **/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
