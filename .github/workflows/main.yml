name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path ZIP Flutter di GitHub"
        required: true
        type: string

permissions:
  contents: read
  actions: write # Penting untuk upload artifact

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # --- PERBAIKAN: Download ZIP dari API GitHub ---
      - name: Download ZIP from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ambil data file dari API
          curl -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L -o source.zip \
               "https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.zip_path }}"
          
          mkdir project
          unzip -o source.zip -d project
          rm source.zip

      - name: Find Flutter Root
        id: root
        run: |
          ROOT=$(find project -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$ROOT" ]; then echo "pubspec.yaml tidak ditemukan!"; exit 1; fi
          echo "root=$ROOT" >> $GITHUB_OUTPUT

      - name: Flutter Pub Get
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.root.outputs.root }}
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            **/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          
